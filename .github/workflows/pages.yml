# Modern Pages deploy — replaces the legacy "deploy from a branch" pipeline whose
# deployment queue wedged on 2026-07-02 (three deploys stuck at deployment_queued
# for the full 10-min timeout while builds succeeded in seconds).
# The site is plain static HTML (no Jekyll features in use), so we upload the repo
# as-is. Activates when Settings → Pages → Source is set to "GitHub Actions".
# Manual re-run: Actions tab → this workflow → Run workflow (workflow_dispatch).
name: Deploy site to Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
